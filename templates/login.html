<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/login.css">
    <link rel="stylesheet" href="static/tailwind.min.css">
    <title>LogIn</title>
</head>
<body class="flex justify-center items-center">
    <div >
        <form class="items-center justify-center flex flex-col gap-2 " action="{{ url_for("login")}}" method="post">
            <label for="username">UserName</label>
            <input class="pl-2 text-black" name="username" required type="text">
            <label for="Password" >Password</label>
            <input class="pl-2 text-black" type="text" required name="password">
            <button id="sub" type="submit">Login</button>
        </form>
    </div>
</body>
</html>
